[package]
name = "muon"
version = "1.1.1"
edition = "2024"

[dependencies]
httplib = { path = "./httplib", default-features = false, features = ["asyncffi"] }
tokio = { version = "1.50.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
clap = { version = "4.6.0", features = ["derive"] }
toml = "0.9.8"

dashmap = "*"

rustls = { version = "=0.23.37", default-features = false, features = ["aws-lc-rs"] } # TODO: allow selecting ring or aws
tokio-rustls = "=0.26.4"

async-trait = "0.1.89"
owo-colors = "4.3.0"
phf = { version = "0.13.1", features = ["macros"] }

[features]
default = ["unix-sockets"]
unix-sockets = ["httplib/unix-sockets"]
